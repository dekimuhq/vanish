<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0f1216"/>
  <!-- whiskers -->
  <g stroke="#4fd1c5" stroke-width="1.1" stroke-linecap="round" opacity="0.67">
    <line x1="21" y1="40" x2="8" y2="37"/>
    <line x1="21" y1="43" x2="7" y2="45"/>
    <line x1="43" y1="40" x2="56" y2="37"/>
    <line x1="43" y1="43" x2="57" y2="45"/>
  </g>
  <!-- ears + head: near-black cat with a teal rim so it reads on the dark tile -->
  <g fill="#06080b" stroke="#4fd1c5" stroke-width="2.3" stroke-linejoin="round">
    <polygon points="16,10 29.5,24 19,28"/>
    <polygon points="48,10 34.5,24 45,28"/>
    <ellipse cx="32" cy="39" rx="18" ry="15.5"/>
  </g>
  <!-- eyes (teal) with vertical vanishing-slit pupils -->
  <g>
    <ellipse cx="25.5" cy="38" rx="3" ry="4.3" fill="#5eead4"/>
    <ellipse cx="38.5" cy="38" rx="3" ry="4.3" fill="#5eead4"/>
    <line x1="25.5" y1="34.4" x2="25.5" y2="41.6" stroke="#06080b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="38.5" y1="34.4" x2="38.5" y2="41.6" stroke="#06080b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- nose -->
  <polygon points="32,44.5 30.4,42.6 33.6,42.6" fill="#5eead4"/>
</svg>
